<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrendWatchNow - AI-Powered Trending News & Analysis</title>
    
    <!-- Google Analytics 4 - Set VITE_GA_ID env var to enable -->
    <script id="ga-init">
      (function() {
        var gaId = '%VITE_GA_ID%';
        // Only load if env var is set (not the placeholder)
        if (gaId && gaId.startsWith('G-')) {
          window.GA_MEASUREMENT_ID = gaId;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
          document.head.appendChild(s);
          window.dataLayer = window.dataLayer || [];
          window.gtag = function(){dataLayer.push(arguments);};
          gtag('js', new Date());
          gtag('config', gaId, {
            send_page_view: false,
            cookie_flags: 'SameSite=None;Secure'
          });
        }
      })();
    </script>
    <meta name="description" content="TrendWatchNow delivers AI-curated trending news, in-depth analysis, and breaking stories across technology, politics, business, science, and more." />
    <meta property="og:title" content="TrendWatchNow - AI-Powered Trending News & Analysis" />
    <meta property="og:description" content="Stay ahead with AI-curated trending news and in-depth analysis." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://trendwatchnow.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://trendwatchnow.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
